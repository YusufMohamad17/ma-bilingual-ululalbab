#:schema node_modules/wrangler/config-schema.json
name = "ma-bilingual-ululalbab"
compatibility_date = "2024-04-03"
compatibility_flags = [ "nodejs_compat" ]

# Note: Baris 'main' dikosongkan karena dideploy sebagai Cloudflare Pages statik.

# ==============================================================================
# 1. BINDING CLOUDFLARE D1 DATABASE (SQL)
# ==============================================================================
[[d1_databases]]
binding = "DB"                                   # Diakses di kode: env.DB
database_name = "mab-d1-db"                       # Nama database di Cloudflare
database_id = "a631e1fc-7545-4f57-80bb-c79cbddada68" # ID asli dari terminal npx wrangler d1 create
migrations_dir = "migrations"                     # Lokasi folder migrasi SQL Anda

# ==============================================================================
# 2. BINDING CLOUDFLARE R2 BUCKET (Storage Gambar & Berkas)
# ==============================================================================
[[r2_buckets]]
binding = "BUCKET"                               # Diakses di kode: env.BUCKET
bucket_name = "mab-r2-assets"                     # Nama bucket di Cloudflare

# ==============================================================================
# 3. BINDING CLOUDFLARE KV NAMESPACE (Pengaturan & Cache)
# ==============================================================================
[[kv_namespaces]]
binding = "KV"                                   # Diakses di kode: env.KV
id = "3b24e715e1ca4c7ea4cbbc5fb4115291"                # ID asli dari terminal npx wrangler kv:namespace create
