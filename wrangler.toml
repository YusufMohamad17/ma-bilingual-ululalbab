#:schema node_modules/wrangler/config-schema.json
name = "ma-bilingual-ululalbab"
compatibility_date = "2024-04-03"
compatibility_flags = [ "nodejs_compat" ]

# ==============================================================================
# HANYA JIKA DEPLOY SEBAGAI WORKER (Abaikan jika menggunakan Cloudflare Pages)
# ==============================================================================
# main = "server.ts" 

# ==============================================================================
# 1. BINDING CLOUDFLARE D1 DATABASE (SQL)
# ==============================================================================
# Jalankan di terminal untuk membuat database baru:
# npx wrangler d1 create mab-d1-db
#
# Salin "database_id" hasil dari terminal di atas, lalu tempel di bawah ini:
[[d1_databases]]
binding = "DB"                                   # Diakses di kode worker: env.DB
database_name = "mab-d1-db"                       # Nama database di Cloudflare
database_id = "a631e1fc-7545-4f57-80bb-c79cbddada68" # Ganti dengan ID asli dari output terminal
migrations_dir = "migrations"                     # Lokasi folder migrasi SQL Anda

# ==============================================================================
# 2. BINDING CLOUDFLARE R2 BUCKET (Object Storage / Gambar & Berkas)
# ==============================================================================
# Jalankan di terminal untuk membuat R2 Bucket:
# npx wrangler r2 bucket create mab-r2-assets
[[r2_buckets]]
binding = "BUCKET"                               # Diakses di kode worker: env.BUCKET
bucket_name = "mab-r2-assets"                     # Nama bucket di Cloudflare

# ==============================================================================
# 3. BINDING CLOUDFLARE KV NAMESPACE (Key-Value / Cache & Settings)
# ==============================================================================
# Jalankan di terminal untuk membuat KV Namespace:
# npx wrangler kv:namespace create MAB_KV
#
# Salin "id" hasil dari terminal di atas, lalu tempel di bawah ini:
[[kv_namespaces]]
binding = "KV"                                   # Diakses di kode worker: env.KV
id = "3b24e715e1ca4c7ea4cbbc5fb4115291"                # Ganti dengan ID asli dari output terminal

